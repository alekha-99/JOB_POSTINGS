version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: job-scraper-db
    environment:
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpass123
      POSTGRES_DB: jobdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U jobuser -d jobdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: job-scraper-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # WAHA - WhatsApp HTTP API for group messaging
  waha:
    image: devlikeapro/waha:latest
    container_name: job-scraper-waha
    ports:
      - "3003:3000"
    environment:
      # Session name for this instance
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WHATSAPP_RESTART_ALL_SESSIONS: "true"
      WHATSAPP_HOOK_URL: ""
      # API key for security (optional)
      WHATSAPP_API_KEY: "secret123"
      # Dashboard credentials
      WHATSAPP_SWAGGER_USERNAME: "admin"
      WHATSAPP_SWAGGER_PASSWORD: "password"
      WAHA_DASHBOARD_ENABLED: "true"
      WAHA_SWAGGER_ENABLED: "true"
    volumes:
      - waha_sessions:/app/.wwebjs_auth
    restart: unless-stopped

  # Main Job Scraper Application
  app:
    build: .
    container_name: job-scraper-app
    depends_on:
      postgres:
        condition: service_healthy
      waha:
        condition: service_started
    environment:
      # Override localhost with container names
      - WAHA_API_URL=http://waha:3000
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: always

volumes:
  postgres_data:
  pgadmin_data:
  waha_sessions:
